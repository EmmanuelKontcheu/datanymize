# jqwik Configuration for Datanymize Property-Based Tests
# 
# This file configures the jqwik property-based testing framework.
# All values can be overridden via system properties or @Property annotations.

# Default number of tries per property test
# Higher values provide better coverage but take longer to run
tries = 100

# Maximum ratio of discarded examples to generated examples
# If exceeded, the test fails to ensure sufficient coverage
max-discard-ratio = 5

# Timeout for individual property tests (format: 1s, 1m, 1h)
# Prevents tests from running indefinitely
timeout = 60s

# Random seed for reproducibility
# Set to a specific value to reproduce a failed test
# Leave empty to use random seed each run
# seed = 1234567890

# Shrinking mode for better failure diagnostics
# Options: FULL, BOUNDED, OFF
shrinking = FULL

# Report only the first failing example
# Set to false to see all failing examples
report-only-first-failure = true

# Database configuration for integration tests
# Options: in-memory, postgresql, mysql, mongodb
database = in-memory

# Enable detailed logging for debugging
# Set to true to see detailed test execution logs
# verbose = false

# Number of threads for parallel test execution
# Set to 1 to disable parallelization
# parallel-threads = 1
